<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Interactive Quiz Application</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Welcome Screen -->

    <div class="welcome-screen">

        <h1>🧠 Interactive Quiz Application</h1>

        <p>Welcome to the JavaScript Quiz!</p>

        <h3>Total Questions: 10</h3>

        <br>

        <p>📌 Instructions</p>

        <p>✅ Read each question carefully.</p>

        <p>✅ Select only one answer.</p>

        <p>✅ The next question will load automatically.</p>

        <p>✅ Check your final score at the end.</p>

        <button id="startBtn">Start Quiz</button>

    </div>

    <!-- Quiz Screen -->

    <div class="quiz-screen"></div>

    <!-- JavaScript Files -->

    <script src="questions.js"></script>
    <script src="script.js"></script>

</body>

</html>
